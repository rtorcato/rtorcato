name: Generate Snake

on:
  # Snake banner is hidden in README — auto-triggers disabled.
  # Re-enable by un-commenting the schedule/push lines below, or run manually via Actions tab.
  workflow_dispatch:
  # schedule:
  #   - cron: "0 */24 * * *"
  # push:
  #   branches:
  #     - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
